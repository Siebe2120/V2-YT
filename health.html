<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<title>Health — Vitals</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #050506;
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --text-quaternary: #4D4B47;

  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; position: relative; overflow-x: hidden; }

body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(60% 50% at 82% 14%, rgba(224, 118, 88, 0.16) 0%, transparent 60%),
    radial-gradient(50% 40% at 18% 90%, rgba(180, 180, 200, 0.06) 0%, transparent 60%);
  filter: blur(40px);
  pointer-events: none; z-index: 0;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none; z-index: 1;
}
@keyframes drift { 0% { transform: translate(0, 0); } 100% { transform: translate(-2%, 2%); } }

main {
  position: relative; z-index: 2;
  max-width: 720px; margin: 0 auto;
  padding: 56px 20px 80px;
  padding-top: max(56px, env(safe-area-inset-top, 56px));
}

.section-title {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin: 0 4px 14px;
  display: flex; align-items: center; gap: 12px;
}
.section-title::before { content: '≡'; font-size: 14px; opacity: 0.5; }

.sleep-open-btn {
  display: flex; align-items: center; gap: 14px;
  margin: 0 0 24px;
  padding: 16px 18px;
  background: linear-gradient(135deg, rgba(125, 211, 252, 0.10), rgba(168, 162, 255, 0.08));
  border: 1px solid rgba(168, 162, 255, 0.18);
  border-radius: 16px;
  text-decoration: none; color: var(--text-primary);
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, transform 0.10s;
}
.sleep-open-btn:hover {
  background: linear-gradient(135deg, rgba(125, 211, 252, 0.16), rgba(168, 162, 255, 0.14));
}
.sleep-open-btn:active { transform: scale(0.985); }
.sleep-open-icon {
  font-size: 22px; line-height: 1;
  filter: grayscale(20%);
}
.sleep-open-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.sleep-open-title {
  font-size: 14px; font-weight: 700; letter-spacing: 0.02em;
}
.sleep-open-sub {
  font-size: 11px; font-weight: 500;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  letter-spacing: 0.08em; text-transform: uppercase;
}
.sleep-open-chevron {
  font-size: 22px; line-height: 1;
  color: var(--text-tertiary);
  font-weight: 300;
}

.water-embed { margin-top: 56px; }
.water-iframe {
  display: block;
  width: 100%;
  height: 880px;
  border: 0;
  background: transparent;
  border-radius: 16px;
  overflow: hidden;
  color-scheme: dark;
}
@media (max-width: 480px) {
  .water-embed { margin-top: 40px; }
  .water-iframe { height: 780px; }
}


.attribution {
  text-align: center; margin-top: 28px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-quaternary);
}

@media (max-width: 600px) {
  main { padding: 40px 16px 60px; }
}

::selection { background: rgba(224, 118, 88, 0.3); color: var(--text-primary); }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }
</style>
</head>
<body>

<main>

<!-- ===== Garmin card ===== -->
  <style>
    .gd-section { margin-bottom: 32px; }
    .gd-card {
      padding: 22px 22px 18px;
      background: rgba(255,255,255,0.025);
      border-radius: 22px;
      box-shadow: 0 1px 0 0 rgba(255,255,255,0.06) inset, 0 12px 40px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.25);
    }
    .gd-brand { display:inline-flex; align-items:center; gap:8px; }
    .gd-brand-mark { width:22px; height:22px; border-radius:6px; background:#007CC3; color:#FFF; font-weight:900; font-size:12px; display:inline-flex; align-items:center; justify-content:center; letter-spacing:-0.04em; box-shadow:0 0 12px rgba(0,124,195,0.35); }
    .gd-brand-text { font-weight:800; font-size:13px; letter-spacing:0.18em; color:var(--text-primary); }
    .gd-head { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
    .gd-head-right { display:flex; align-items:center; gap:10px; }
    .gd-updated { font-size:11px; color:var(--text-tertiary); font-family:var(--font-mono); }
    .gd-refresh { width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform 0.4s, background 0.18s, color 0.18s; }
    .gd-refresh:hover { background:rgba(255,255,255,0.10); color:var(--text-primary); }
    .gd-refresh.spin { transform:rotate(360deg); }
    .gd-err { background:rgba(255,107,107,0.08); border:1px solid rgba(255,107,107,0.28); color:#FF8A8A; padding:10px 12px; border-radius:10px; font-size:11.5px; font-family:var(--font-mono); margin-bottom:14px; }
    .gd-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .gd-stat { position:relative; background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.04); border-radius:12px; padding:12px 10px; text-align:center; }
    .gd-stat-label { font-size:10px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.14em; font-weight:700; margin-bottom:8px; }
    .gd-stat-val { font-size:19px; font-weight:700; color:var(--text-primary); line-height:1; font-variant-numeric:tabular-nums; letter-spacing:-0.02em; }
    .gd-stat-sub { font-size:9.5px; color:var(--text-tertiary); margin-top:5px; font-family:var(--font-mono); }
    @media (max-width:480px) { .gd-stats { grid-template-columns:repeat(2,1fr); } }
    .gd-verdict { margin-top:18px; padding:16px 18px; background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.04); border-left:2px solid rgba(255,255,255,0.40); border-radius:0 12px 12px 0; }
    .gd-verdict-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .gd-verdict-eye { font-size:10px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.18em; font-weight:700; }
    .gd-verdict-badge { font-size:9.5px; font-weight:800; padding:3px 9px; border-radius:999px; letter-spacing:0.14em; text-transform:uppercase; border:1px solid; }
    .gd-verdict-badge.green  { color:#6BE3A4; border-color:rgba(107,227,164,0.50); background:rgba(107,227,164,0.10); }
    .gd-verdict-badge.yellow { color:#F2C063; border-color:rgba(242,192,99,0.50); background:rgba(242,192,99,0.10); }
    .gd-verdict-badge.red    { color:#FF8A8A; border-color:rgba(255,138,138,0.50); background:rgba(255,138,138,0.10); }
    .gd-verdict-headline { font-size:15px; font-weight:600; color:var(--text-primary); line-height:1.4; }
    .gd-acts { margin-top:22px; padding-top:22px; border-top:1px solid rgba(255,255,255,0.05); }
    .gd-acts-eye { font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:12px; }
    .gd-act { display:grid; grid-template-columns:34px 1fr auto; gap:12px; align-items:center; padding:11px 12px; border-radius:10px; background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.04); margin-bottom:6px; }
    .gd-act-icon { font-size:18px; text-align:center; }
    .gd-act-body { min-width:0; }
    .gd-act-name { font-size:13px; font-weight:600; color:var(--text-primary); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .gd-act-meta { font-size:11px; color:var(--text-tertiary); margin-top:2px; font-family:var(--font-mono); }
    .gd-act-load { font-size:15px; font-weight:700; color:var(--text-primary); font-variant-numeric:tabular-nums; text-align:right; }
    .gd-act-load-sub { font-size:9px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.1em; }
  </style>
  <div class="gd-section">
    <div class="section-title">Garmin</div>
    <div class="gd-card">
      <div class="gd-head">
        <div class="gd-brand"><span class="gd-brand-mark">G</span><span class="gd-brand-text">GARMIN CONNECT</span></div>
        <div class="gd-head-right">
          <span id="gdUpdated" class="gd-updated">—</span>
          <button id="gdRefresh" class="gd-refresh" type="button" aria-label="Refresh"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15A9 9 0 1 1 5.64 5.64L23 10"/></svg></button>
        </div>
      </div>
      <div id="gdErr" class="gd-err" style="display:none"></div>
      <div class="gd-stats">
        <div class="gd-stat"><div class="gd-stat-label">Readiness</div><div class="gd-stat-val" id="gdReadiness">—</div><div class="gd-stat-sub" id="gdReadinessSub">/ 100</div></div>
        <div class="gd-stat"><div class="gd-stat-label">Body Battery</div><div class="gd-stat-val" id="gdBattery">—</div><div class="gd-stat-sub">/ 100</div></div>
        <div class="gd-stat"><div class="gd-stat-label">Sleep</div><div class="gd-stat-val" id="gdSleep">—</div><div class="gd-stat-sub" id="gdSleepSub">duration</div></div>
        <div class="gd-stat"><div class="gd-stat-label">Recovery</div><div class="gd-stat-val" id="gdRecovery">—</div><div class="gd-stat-sub">hrs left</div></div>
        <div class="gd-stat"><div class="gd-stat-label">HRV Status</div><div class="gd-stat-val" id="gdHrvStatus">—</div><div class="gd-stat-sub" id="gdHrvSub">—</div></div>
        <div class="gd-stat"><div class="gd-stat-label">Load</div><div class="gd-stat-val" id="gdLoad">—</div><div class="gd-stat-sub">acute</div></div>
        <div class="gd-stat"><div class="gd-stat-label">Status</div><div class="gd-stat-val" id="gdStatus">—</div><div class="gd-stat-sub">training</div></div>
      </div>
      <div class="gd-verdict" id="gdVerdict" style="display:none">
        <div class="gd-verdict-head"><span class="gd-verdict-eye">Today's call</span><span id="gdVerdictBadge" class="gd-verdict-badge"></span></div>
        <div id="gdVerdictHead" class="gd-verdict-headline"></div>
      </div>
      <div class="gd-acts" id="gdActs" style="display:none">
        <div class="gd-acts-eye">Recent activities</div>
        <div id="gdActList"></div>
      </div>
    </div>
  </div>
  <script>
  (function () {
    const $ = (id) => document.getElementById(id);
    const errEl = $('gdErr');
    function showErr(m) { errEl.textContent = m || ''; errEl.style.display = m ? 'block' : 'none'; }

    // Garmin's numeric training-status codes, as commonly documented by
    // community reverse-engineering of the (unofficial) Connect API.
    const STATUS_LABELS = {
      1: 'Declining', 2: 'Resting', 3: 'Maintaining',
      4: 'Progressing', 5: 'Peaking', 6: 'Overreaching', 7: 'Unproductive'
    };

    function num(v) { return (v === null || v === undefined || Number.isNaN(v)) ? null : v; }

    // Every pick* function is defensive: these are undocumented endpoints,
    // so field names are our best guess from public reverse-engineering
    // write-ups, not a guaranteed contract. Missing fields fall back to
    // "—" per stat instead of breaking the whole card.
    function pickReadiness(raw) {
      const r = Array.isArray(raw) ? raw[0] : raw;
      if (!r) return {};
      return {
        score: num(r.score),
        level: r.level || r.feedbackShort || null,
        recoveryTime: num(r.recoveryTime != null ? r.recoveryTime : r.recoveryTimeHours),
      };
    }
    function pickBodyBattery(raw) {
      const day = Array.isArray(raw) ? raw[raw.length - 1] : raw;
      const arr = day && (day.bodyBatteryValuesArray || day.bodyBatteryValueArray);
      if (Array.isArray(arr) && arr.length) {
        const last = arr[arr.length - 1];
        const level = Array.isArray(last) ? last[1] : (last && last.level);
        return num(level);
      }
      return null;
    }
    function pickHrv(raw) {
      const s = raw && (raw.hrvSummary || raw);
      if (!s) return {};
      return {
        status: s.status || s.hrvStatus || null,
        lastNight: num(s.lastNightAvg != null ? s.lastNightAvg : s.weeklyAvg),
      };
    }
    function pickTrainingStatus(raw) {
      try {
        const byDevice = raw && raw.mostRecentTrainingStatus && raw.mostRecentTrainingStatus.latestTrainingStatusData;
        const first = byDevice && Object.values(byDevice)[0];
        if (!first) return {};
        const load = first.dailyTrainingLoadAcute != null
          ? first.dailyTrainingLoadAcute
          : (first.acuteTrainingLoadDTO && first.acuteTrainingLoadDTO.dailyTrainingLoadAcute);
        return { label: STATUS_LABELS[first.trainingStatus] || first.trainingStatusFeedbackPhrase || null, load: num(load) };
      } catch (e) { return {}; }
    }
    function pickSleep(raw) {
      const d = raw && raw.dailySleepDTO;
      if (!d) return {};
      const score = d.sleepScores && d.sleepScores.overall && d.sleepScores.overall.value;
      return { seconds: num(d.sleepTimeSeconds), score: num(score) };
    }
    function fmtHM(totalSeconds) {
      if (totalSeconds == null) return '—';
      const h = Math.floor(totalSeconds / 3600), m = Math.round((totalSeconds % 3600) / 60);
      return h + 'h ' + m + 'm';
    }

    // "Today's call" — same idea as the old intervals.icu TSB verdict, but
    // driven by Garmin's own Training Readiness score/level instead.
    function pickVerdict(readiness) {
      const score = readiness.score;
      const level = (readiness.level || '').toUpperCase();
      if (score == null && !level) return null;
      if (level.indexOf('LOW') !== -1 || (score != null && score < 40)) {
        return { cls: 'red', badge: 'LOW', headline: 'Low readiness — recovery day. Ease off and prioritize rest.' };
      }
      if (level.indexOf('HIGH') !== -1 || (score != null && score >= 70)) {
        return { cls: 'green', badge: 'HIGH', headline: 'High readiness — good day to push. Go hard on the planned session.' };
      }
      return { cls: 'yellow', badge: 'MODERATE', headline: 'Moderate readiness. Train as planned, keep intensity controlled.' };
    }

    const ACT_ICONS = {
      running: '🏃', trail_running: '🏃', treadmill_running: '🏃',
      cycling: '🚴', road_biking: '🚴', mountain_biking: '🚴', indoor_cycling: '🚴',
      swimming: '🏊', lap_swimming: '🏊', open_water_swimming: '🏊',
      strength_training: '🏋️', fitness_equipment: '🏋️',
      walking: '🚶', hiking: '🥾', yoga: '🧘', cardio_training: '❤️',
    };
    function actIcon(typeKey) { return ACT_ICONS[typeKey] || '📊'; }
    function fmtDist(m) { if (!m) return ''; return (m / 1000).toFixed(1) + ' km'; }
    function fmtDur(s) { if (!s) return ''; const h = Math.floor(s / 3600), m = Math.round((s % 3600) / 60); return (h > 0 ? h + 'h ' : '') + m + 'm'; }
    function fmtActDate(d) { try { return new Date(d).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }); } catch (e) { return ''; } }
    function escapeHtml(str) { return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

    function renderActivities(acts) {
      const list = (Array.isArray(acts) ? acts : []).slice(0, 10);
      if (!list.length) { $('gdActs').style.display = 'none'; return; }
      $('gdActs').style.display = '';
      $('gdActList').innerHTML = list.map(a => {
        const typeKey = a.activityType && a.activityType.typeKey;
        const meta = [fmtActDate(a.startTimeLocal), fmtDist(a.distance), fmtDur(a.duration)].filter(Boolean).join(' · ');
        const load = a.activityTrainingLoad != null ? Math.round(a.activityTrainingLoad) : '—';
        const name = escapeHtml(a.activityName || typeKey || 'Activity');
        return '<div class="gd-act">'
          + '<div class="gd-act-icon">' + actIcon(typeKey) + '</div>'
          + '<div class="gd-act-body"><div class="gd-act-name">' + name + '</div><div class="gd-act-meta">' + meta + '</div></div>'
          + '<div><div class="gd-act-load">' + load + '</div><div class="gd-act-load-sub">load</div></div>'
          + '</div>';
      }).join('');
    }

    async function loadData() {
      showErr('');
      try {
        const r = await fetch('/api/garmin');
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || ('garmin ' + r.status));

        const readiness = pickReadiness(data.readiness);
        const battery = pickBodyBattery(data.bodyBattery);
        const hrv = pickHrv(data.hrv);
        const status = pickTrainingStatus(data.trainingStatus);
        const sleep = pickSleep(data.sleep);

        $('gdReadiness').textContent = readiness.score != null ? readiness.score : '—';
        $('gdReadinessSub').textContent = readiness.level || '/ 100';

        $('gdBattery').textContent = battery != null ? battery : '—';

        $('gdSleep').textContent = sleep.seconds != null ? fmtHM(sleep.seconds) : '—';
        $('gdSleepSub').textContent = sleep.score != null ? ('score ' + sleep.score) : 'duration';

        $('gdRecovery').textContent = readiness.recoveryTime != null ? readiness.recoveryTime : '—';

        $('gdHrvStatus').textContent = hrv.status || '—';
        $('gdHrvSub').textContent = hrv.lastNight != null ? (hrv.lastNight + ' ms') : '—';

        $('gdLoad').textContent = status.load != null ? status.load : '—';

        $('gdStatus').textContent = status.label || '—';

        const verdict = pickVerdict(readiness);
        if (verdict) {
          $('gdVerdict').style.display = '';
          const badge = $('gdVerdictBadge');
          badge.textContent = verdict.badge;
          badge.className = 'gd-verdict-badge ' + verdict.cls;
          $('gdVerdictHead').textContent = verdict.headline;
        } else {
          $('gdVerdict').style.display = 'none';
        }

        renderActivities(data.activities);

        $('gdUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
      } catch (e) {
        showErr(e.message || String(e));
      }
    }

    $('gdRefresh').addEventListener('click', async (e) => {
      const btn = e.currentTarget; btn.classList.add('spin');
      try { await loadData(); } finally { setTimeout(() => btn.classList.remove('spin'), 600); }
    });

    loadData();
  })();
  </script>


  <section id="water" class="water-embed">
    <div class="section-title">Water Tracker</div>
    <iframe src="po-water.html" class="water-iframe" loading="lazy" title="Water Tracker"></iframe>
  </section>

  <div class="attribution">// editable template · all data stays in your browser</div>
</main>


<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'health',
    syncedKeys: ['po_water_v1'],
    onApplied: function () {
      window.dispatchEvent(new Event('storage'));
    }
  });
});
</script>

</body>
</html>
